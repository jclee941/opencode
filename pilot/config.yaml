# opencode-pilot config
# Polls GitHub for new work and auto-creates OpenCode sessions

startup_delay: 15000

# Auto-discovers repos by scanning git remotes under this directory
repos_dir: ~/dev

defaults:
  agent: sisyphus
  prompt: default
  reuse_active_session: true
  prefer_existing_sandbox: true

sources:
  - preset: github/my-issues
    prompt: default

  - preset: github/review-requests
    prompt: review

  - preset: github/my-prs-attention
    prompt: review-feedback

# Override only when local dir name != GitHub repo name
repos:
  qws941/aimo3-prize: { path: ~/dev/prize }

cleanup:
  ttl_days: 30
